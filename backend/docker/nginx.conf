events {
    worker_connections 1024;
}

http {
    server {
        listen 80;
        server_name _;
        # Let's Encrypt ACME challenge path — certbot writes here
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }
        location / {
            return 301 https://$host$request_uri;
        }
    }

    server {
        listen 443 ssl;
        server_name _;

        ssl_certificate     /etc/nginx/certs/fullchain.pem;
        ssl_certificate_key /etc/nginx/certs/privkey.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;

        # Only /webhook/* and /rest/* are exposed — the n8n editor UI
        # itself (root path) can be left reachable too if you want to
        # manage workflows remotely, or you can comment this block out
        # and manage n8n purely over an SSH tunnel instead.
        location / {
            proxy_pass http://n8n:5678;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 120s;
        }
    }
}
